services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: yt-text-search-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: "${MEILI_API_KEY:-}"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  meili_data:
